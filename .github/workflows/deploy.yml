name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Only deploy when code changes — NOT when flight data updates
    paths-ignore:
      - 'public/data/**'
      - '**.md'
  # Allow manual deploy from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_REPO: rosamir/tsua-demo
          VITE_GITHUB_BRANCH: main
          VITE_BASE_PATH: /tsua-demo/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - uses: actions/deploy-pages@v4
        id: deployment
