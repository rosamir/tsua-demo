name: Poll IZ152 Flight Data

on:
  schedule:
    # Every 5 minutes (GitHub's minimum interval)
    - cron: '*/5 * * * *'
  # Allow manual trigger from github.com/rosamir/tsua-demo/actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install email dependency
        run: npm install nodemailer --no-save

      - name: Fetch flight data and detect changes
        id: poll
        run: node scripts/poll-flight.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
        # Don't fail the workflow if FlightStats is unreachable
        continue-on-error: true

      - name: Check if data changed
        id: diff
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "data: update IZ152 flight data [$(date -u '+%H:%M UTC')]"
          git push
